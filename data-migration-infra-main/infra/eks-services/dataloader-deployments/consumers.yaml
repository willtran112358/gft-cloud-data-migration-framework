---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-create-responses
  namespace: dataloader
spec:
  selector:
    matchLabels:
      app: consumer-create-responses
  replicas: 5
  template:
    metadata:
      labels:
        app: consumer-create-responses
    spec:
      serviceAccountName: data-migration-services
      imagePullSecrets:
      - name: regcredb
      containers:
        - image: dl-consumers
          name: consumer-create-responses
          imagePullPolicy: Always
          env:
          - name: HTTP_RECONCILIATOR_API
            value: "reconciliator-api"
          - name: TOPIC
            value: "vault.data_loader_api.v1.data_loader.resource_batch.create.responses"             
          - name: GROUP_ID
            value: "consumer-group1"     

