---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-posting-dlq
  namespace: dataloader
spec:
  selector:
    matchLabels:
      app: consumer-posting-dlq
  replicas: 5
  template:
    metadata:
      labels:
        app: consumer-posting-dlq
    spec:
      serviceAccountName: data-migration-services
      imagePullSecrets:
      - name: regcredb
      containers:
        - image: dl-consumers
          name: consumer-posting-dlq
          imagePullPolicy: Always
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "0.1"
              memory: "128Mi"
          env:
          - name: HTTP_RECONCILIATOR_API
            value: "reconciliator-api"
          - name: TOPIC
            value: "vault.migrations.postings.requests.dlq"
          - name: GROUP_ID
            value: "consumer-group1"          
  
