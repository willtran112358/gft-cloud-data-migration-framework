apiVersion: batch/v1
kind: Job
metadata:
  name: global-reconciliator-customer
  namespace: dataloader
spec:
  template:
    spec:
      serviceAccountName: data-migration-services
      imagePullSecrets:
      - name: regcredb
      containers:
      - name: global-reconciliator-customer
        image: global-reconciliator-api
        imagePullPolicy: Always
        env:
          - name: ENTITY
            value: "customer"       
      restartPolicy: Never
  backoffLimit: 0     